<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Portfolio</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ---------- Featured (zigzag editorial) ---------- */
  .featured {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .piece {
    display: flex;
    align-items: flex-start;
    gap: 3.5rem;
    padding: 4.5rem 0;
    border-bottom: 1px solid var(--border);
  }
  .piece.reverse {
    flex-direction: row-reverse;
  }
  /* Spotlight: 通常のジグザグ(.piece)ではなく、画面幅いっぱいのヒーロー表示にする */
  .piece--spotlight {
    flex-direction: column;
    align-items: stretch;
    gap: 1.8rem;
  }
  .piece--spotlight .frame-wrap { flex: 1 1 auto; }
  .piece--spotlight .frame-wrap::before {
    content: "";
    position: absolute;
    inset: -48px;
    background: radial-gradient(ellipse at center, rgba(255, 200, 87, 0.22), transparent 70%);
    filter: blur(16px);
    z-index: -1;
  }
  .piece--spotlight .info { max-width: 640px; }
  .frame-wrap {
    position: relative;
    padding: 16px;
    flex: 1 1 58%;
    min-width: 0;
  }
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--accent);
    opacity: 0.75;
  }
  .piece--spotlight .corner { border-color: var(--gold); width: 26px; height: 26px; }
  .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; }
  .frame {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    isolation: isolate;
    cursor: zoom-in;
  }
  .piece--spotlight .frame { border-color: rgba(255, 200, 87, 0.35); border-radius: 20px; }
  .frame img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .frame:hover img { transform: scale(1.035); }
  .frame .index {
    position: absolute;
    top: 1rem;
    left: 1rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--fg);
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    padding: 0.3rem 0.6rem;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .info { flex: 1 1 42%; min-width: 0; padding-top: 0.4rem; }
  .piece--spotlight .info-num { color: var(--gold); }

  @media (max-width: 760px) {
    .piece { flex-direction: column; gap: 1.6rem; padding: 3rem 0; }
    .frame-wrap, .info { flex: 1 1 auto; width: 100%; }
  }

  /* ---------- Archive (dense grid) ---------- */
  .archive {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 6rem;
  }
  .archive-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.8rem;
  }
  .thumb {
    all: unset;
    cursor: zoom-in;
    position: relative;
    display: block;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .thumb:hover img { transform: scale(1.08); }
  .thumb:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .thumb .thumb-label {
    position: absolute;
    inset: auto 0 0 0;
    padding: 0.55rem 0.6rem;
    font-family: var(--mono);
    font-size: 0.64rem;
    color: #fff;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .thumb:hover .thumb-label,
  .thumb:focus-visible .thumb-label { opacity: 1; }
</style>
</head>
<body>

  <div class="hero-row">
    <h1>AI Portfolio</h1>

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function buildMeta(item) {
  const dl = el("dl", "meta");
  const rows = [
    ["model", item.model],
    ["seed", item.seed],
    ["steps / cfg", item.steps],
    ["prompt", item.prompt],
    ["negative", item.negative]
  ];
  if (item.note) rows.push(["note", item.note]);
  for (const [key, value] of rows) {
    dl.appendChild(el("dt", null, key));
    dl.appendChild(el("dd", null, value));
  }
  return dl;
}

// globalIndex: ページ全体を通した通し番号(IMG_XX表示用)。reverseIndex: ジグザグの向きを決めるための、そのセクション内でのローカルな連番
function buildPiece(item, { globalIndex, totalCount, reverseIndex = 0, spotlight = false }) {
  const classes = ["piece"];
  if (spotlight) classes.push("piece--spotlight");
  else if (reverseIndex % 2 === 1) classes.push("reverse");
  const article = el("article", classes.join(" "));

  const frameWrap = el("div", "frame-wrap");
  frameWrap.appendChild(el("span", "corner corner-tl"));
  frameWrap.appendChild(el("span", "corner corner-br"));
  const frame = el("div", "frame");
  frame.appendChild(el("span", "index", "IMG_" + String(globalIndex + 1).padStart(2, "0")));
  const img = el("img");
  img.src = item.src;
  img.alt = item.alt;
  img.loading = "lazy";
  frame.appendChild(img);
  frame.addEventListener("click", () => openLightbox(item));
  frameWrap.appendChild(frame);
  article.appendChild(frameWrap);

  const info = el("div", "info");
  info.appendChild(el("span", "info-num", String(globalIndex + 1).padStart(2, "0") + " / " + String(totalCount).padStart(2, "0")));
  info.appendChild(el("h2", null, item.title));
  info.appendChild(el("p", "desc", item.desc));
  info.appendChild(el("p", "specs", item.specs));
  const details = document.createElement("details");
  const summary = el("summary", "meta-toggle", "生成情報");
  details.appendChild(summary);
  details.appendChild(buildMeta(item));
  info.appendChild(details);
  article.appendChild(info);

  return article;
}

function buildThumb(item) {
  const button = el("button", "thumb");
  button.type = "button";
  const img = el("img");
  img.src = item.src;
  img.alt = item.alt;
  img.loading = "lazy";
  button.appendChild(img);
  button.appendChild(el("span", "thumb-label", item.title));
  button.addEventListener("click", () => openLightbox(item));
  return button;
}

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxTitle = document.getElementById("lightbox-title");
const lightboxDesc = document.getElementById("lightbox-desc");
const lightboxSpecs = document.getElementById("lightbox-specs");
const lightboxMeta = document.getElementById("lightbox-meta");

function openLightbox(item) {
  lightboxImg.src = item.src;
  lightboxImg.alt = item.alt;
  lightboxTitle.textContent = item.title;
  lightboxDesc.textContent = item.desc;
  lightboxSpecs.textContent = item.specs;
  lightboxMeta.replaceChildren(...buildMeta(item).children);
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

// pinned: true の作品(Spotlight)は新着順に関わらず常に先頭。
// 残りは新しい順にLATEST_COUNT件だけLatestでジグザグ表示し、それ以外はArchiveのグリッドへ。
const LATEST_COUNT = 2;
const spotlightItems = ITEMS.filter((item) => item.pinned);
const nonSpotlight = ITEMS.filter((item) => !item.pinned);
const latestItems = nonSpotlight.slice(0, LATEST_COUNT);
const archiveItems = nonSpotlight.slice(LATEST_COUNT);

// IMG_XXの通し番号はページ上での表示順(Spotlight → Latest → Archive)に合わせる
const displayOrder = [...spotlightItems, ...latestItems, ...archiveItems];
const globalIndexOf = new Map(displayOrder.map((item, i) => [item, i]));

const spotlightEl = document.getElementById("spotlight");
const latestEl = document.getElementById("latest");
const gridEl = document.getElementById("grid");

spotlightItems.forEach((item) => {
  spotlightEl.appendChild(buildPiece(item, { globalIndex: globalIndexOf.get(item), totalCount: ITEMS.length, spotlight: true }));
});
latestItems.forEach((item, i) => {
  latestEl.appendChild(buildPiece(item, { globalIndex: globalIndexOf.get(item), totalCount: ITEMS.length, reverseIndex: i }));
});
archiveItems.forEach((item) => gridEl.appendChild(buildThumb(item)));

if (latestItems.length === 0) document.getElementById("latest-head").style.display = "none";
if (archiveItems.length === 0) document.querySelector(".archive").style.display = "none";

document.getElementById("item-count").textContent = String(ITEMS.length).padStart(2, "0");
document.getElementById("archive-count").textContent = archiveItems.length + " works";
</script>
