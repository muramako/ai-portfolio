<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Process – AI Portfolio</title>
<link rel="stylesheet" href="style.css">
<style>
  .cases {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem 6rem;
  }
  .empty {
    padding: 4rem 0;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .case {
    padding: 3.5rem 0;
    border-bottom: 1px solid var(--border);
  }
  .case-head {
    margin-bottom: 2rem;
  }
  .case-head h2 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 0.6rem; }
  .case-head .desc { color: var(--muted); font-size: 0.92rem; line-height: 1.7; margin: 0; max-width: 62ch; }
  .case-related {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
  }
  .case-related:hover { border-color: var(--accent); }

  .timeline {
    position: relative;
    margin: 0;
    padding-left: 2.4rem;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 0.55rem;
    top: 0.4rem;
    bottom: 0.4rem;
    width: 1px;
    background: var(--border);
  }
  .step {
    position: relative;
    padding-bottom: 2.2rem;
  }
  .step:last-child { padding-bottom: 0; }
  .step::before {
    content: "";
    position: absolute;
    left: -2.4rem;
    top: 0.3rem;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--accent);
  }
  .step-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 0.6rem;
  }
  .step-body {
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .step-body img {
    width: 160px;
    max-width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
    cursor: zoom-in;
  }
  .step-body p {
    flex: 1 1 260px;
    margin: 0;
    color: var(--fg);
    font-size: 0.9rem;
    line-height: 1.7;
  }

  .step-trigger-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    margin-bottom: 0.5rem;
    color: var(--muted);
  }
  .step-trigger-tag.human {
    color: var(--accent);
    border-color: var(--accent);
  }
  .step-trigger {
    margin: 0 0 0.9rem;
    padding-left: 0.8rem;
    border-left: 2px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
    font-style: italic;
  }
  .step-prompt-block {
    margin: 0 0 1rem;
  }
  .step-prompt-k {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 0.35rem;
  }
  .step-prompt-k.neg { color: var(--muted); }
  .step-prompt {
    font-family: var(--mono);
    font-size: 0.72rem;
    line-height: 1.65;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    margin: 0 0 0.7rem;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--fg);
  }
  .step-prompt.neg {
    color: var(--muted);
    font-size: 0.68rem;
  }
  .step-analysis {
    margin-top: 1rem;
    display: grid;
    gap: 0.5rem;
    font-size: 0.85rem;
    line-height: 1.65;
  }
  .step-analysis div { margin: 0; }
  .step-analysis .k {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    margin-right: 0.5em;
  }

  .insight {
    margin-top: 2.2rem;
    padding: 1.1rem 1.3rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--fg);
  }
  .insight strong {
    display: block;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
</style>
</head>
<body>

<header class="hero">
  <span class="eyebrow"><a href="index.html">← Gallery</a></span>
  <div class="hero-row">
    <h1>Process</h1>
    <p>作品づくりで悩んだこと・うまくいったことを、後で見返せるように残しておく記録です。すべての作品ではなく、知見として残す価値があったものだけを載せています。</p>
    <div class="hero-count"><strong id="case-count">00</strong>cases</div>
  </div>
</header>

<main class="cases" id="cases"></main>

<footer>
  <span>AI Portfolio</span>
  <a href="index.html">← Gallery</a>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" type="button">close ✕</button>
  <div class="lightbox-inner">
    <figure class="lightbox-figure">
      <img id="lightbox-img" src="" alt="">
    </figure>
  </div>
</div>

<script>
// ひとつの「悩んだ話・うまくいった話」= ひとつのオブジェクト。
// steps は要点となる分岐点だけを残す（全試行を残す必要はない）。
const CASES = [
  {
    title: "猫耳少女 vs 猫の食べ物争奪戦 — タグ設計の迷走",
    desc: "「猫耳少女」と「本物の猫」を1枚の絵に混在させようとして、AIが人間と動物を取り違え続けた話。細かい微調整は省き、本当の転換点だけを追っている。各転換点の「きっかけ」ラベルは、それが人間の指摘によるものかAI自身の判断によるものかを示す。",
    steps: [
      {
        label: "転換点1 — 猫がそもそも写っていなかった",
        triggerSource: "human",
        trigger: "依頼: 猫耳少女と猫が食べ物(魚や肉など)を取り合うコミカルな絵。動物(猫)もかわいいアニメ調で描く。",
        prompt: "masterpiece, best quality, anime style, 1girl, cat ears, cat tail, chibi proportions, comical expression, tug of war over a fish, small cute cat pulling the other end of the fish, dynamic action pose, sparkles, motion lines, open mouth, determined expression, indoor kitchen background, warm lighting, vibrant colors",
        negative: "lowres, bad anatomy, extra limbs, extra fingers, deformed, blurry, watermark, text, signature, realistic, photo, scary, gore, copyrighted character",
        image: "images/process/catgirl_vs_cat/01_no_cat.webp",
        outcome: "猫耳少女だけが描かれ、本物の猫が画面に存在しなかった。ユーザーから「実際のねこが居ません」と指摘を受けた。",
        cause: "プロンプト中の「cat」への言及が「cat ears / cat tail」という少女のアクセサリ描写に使い切られ、独立した動物としての猫を指す記述がなかった、という最初の気づき。",
        change: "猫を独立した被写体として明示するタグを追加(fluffy orange tabby cat, feline, whiskers, paws, cat biting one end of a fish)。"
      },
      {
        label: "転換点2 — 少女の体が猫と融合した",
        triggerSource: "human",
        trigger: "猫を明示したことで登場はしたが、ユーザーから「アニメ調の猫が誤解させた。猫も人も普通の等身・ディテールでいい」と指摘され、デフォルメを弱める修正(chibi proportions撤去→normal proportions追加)を経てもまだ別の破綻が出た。",
        prompt: "masterpiece, best quality, anime style, detailed illustration, normal proportions, orange tabby cat, realistic cat anatomy, detailed fur, cat biting one end of a fish, 1girl, cat ear headband, cat tail, standard anime body proportions, detailed face, comical expression, tug of war over the fish, girl pulling the other end of the fish, both characters determined expression, dynamic action pose, motion lines, sparkles, indoor kitchen background, warm lighting, vibrant colors",
        negative: "lowres, bad anatomy, extra limbs, extra fingers, deformed, blurry, watermark, text, signature, realistic, photo, scary, gore, copyrighted character, chibi, super deformed, oversized head, giant head, disproportionate",
        image: "images/process/catgirl_vs_cat/02_body_fused.webp",
        outcome: "頭身は自然になったが、少女の下半身が縞模様の毛皮に覆われ、猫の体と視覚的に融合したように見えた。ユーザー「女性の体、猫になってない?」。",
        cause: "猫の縞模様の描写が少女の脚にも転写された。少女側に「人間の肌・脚」を明示する記述が無く、猫由来の質感がそのまま流用されたと推測。",
        change: "human girl / bare human legs / plain white t-shirt のように「人間であること」を直接示すタグを追加(その後ネガティブを盛りすぎて猫が全消えする失敗も経て、最終的にこの服装指定に落ち着いた)。この修正で見た目自体は解決し、いったんユーザーに提示。だが「足が消えている箇所がある、釣竿や綱引きという構図が複雑すぎるのでは」という指摘を受け、複雑な小道具・ポーズ指定を全部やめて単純化する方針に転換した。"
      },
      {
        label: "転換点3 — 診断実験: 猫耳少女が猫2匹に化けると判明",
        triggerSource: "human",
        trigger: "構図を単純化して出し直したところ、今度は少女が画面の端に追いやられ小さく歪んだ。ここでユーザーから「猫耳少女をちゃんと認識していない。猫耳と猫を誤解しちゃうんでしょうね」という具体的な仮説が示され、それを検証するため10回まで自律的に試行してよいと許可を得た。",
        prompt: "1girl, animal ears, cat ears, cat tail, sitting, looking at cat, cat, fish, kitchen background, duo",
        negative: "lowres, bad anatomy, extra limbs, missing limbs, extra fingers, deformed, blurry, watermark, text, signature, copyrighted character",
        image: "images/process/catgirl_vs_cat/03_two_cats.webp",
        outcome: "ユーザーの仮説を検証するため、あえて人間を示すタグを外し、猫寄りのタグだけに絞って生成したところ、少女の要素は完全に消え、本物の猫が2匹並んで描かれた。「catgirl」という単一タグに置き換えても同じ結果になることを確認し、ユーザーの仮説が正しいと実証できた。",
        cause: "cat ears / cat tail / catgirl のような猫寄りタグと、動物を指す cat タグを同時に使うと、モデルは人間キャラクターの解釈を放棄し、猫を複数体生成する方向に強く引っ張られる。ユーザーが指摘した「猫耳と猫の誤解」を、AI側が実験で裏付けた形。",
        change: "転換点2で分かっていた「human girl, bare human legs, plain white t-shirt」という人間性を明示するタグを復活させつつ、複雑な構図指定は入れずに組み合わせる。"
      },
      {
        label: "転換点4 — 解決",
        triggerSource: "ai",
        trigger: "転換点3で実証できた知見(人間性を示すタグを残す必要がある)と、転換点2後半で得ていた教訓(構図は単純にする)を、AI側の判断で組み合わせて試す。",
        prompt: "1girl, human girl, orange hair, plain white t-shirt, denim shorts, bare human legs, normal skin tone, cat ear headband accessory, sharp glaring eyes, sitting, looking at cat, orange tabby cat, sitting, looking at girl, raw fish on the floor between them, kitchen background",
        negative: "lowres, bad anatomy, extra limbs, missing limbs, extra fingers, deformed, blurry, watermark, text, signature, copyrighted character, furry body, animal legs",
        image: "images/process/catgirl_vs_cat/04_resolved.webp",
        outcome: "猫と少女がそれぞれ独立した存在として安定して描かれた。少女の脚も正常で、床に散らばった魚がコミカルな緊迫感を出している。同一プロンプトで別シードにしても同様に安定し、逆に横長構図で正対させるバリエーションは前傾姿勢で顔が歪んで不採用となった。最終的にユーザーがこの構図(体育座り版)を選定。"
      }
    ],
    insight: "「cat ears」「catgirl」のような猫寄りのタグと、本物の動物を指す「cat」タグを同時に使うと、モデルは人間側の要素を無視して猫2匹の絵に倒れやすい(転換点3で確認)。人間キャラクターを保ちたい場合は human girl / bare human legs / plain white t-shirt のように「人間であること」を直接示すタグを残す必要がある。また、小道具や動作(釣竿・綱引きなど)を細かく指定しすぎると四肢の破綻を誘発しやすく、ネガティブプロンプトも一度に盛りすぎると必要な要素まで消してしまう。構図はある程度AI側の解釈に委ねたほうが安定する。"
  }
];

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt || "";
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

function buildCase(caseData) {
  const article = el("article", "case");

  const head = el("div", "case-head");
  head.appendChild(el("h2", null, caseData.title));
  head.appendChild(el("p", "desc", caseData.desc));
  if (caseData.relatedImage) {
    const link = el("a", "case-related", (caseData.relatedLabel || "完成した作品を見る") + " →");
    link.href = "index.html";
    head.appendChild(link);
  }
  article.appendChild(head);

  const timeline = el("div", "timeline");
  caseData.steps.forEach((step) => {
    const stepEl = el("div", "step");
    stepEl.appendChild(el("p", "step-label", step.label));

    if (step.triggerSource) {
      const tag = el(
        "span",
        "step-trigger-tag " + step.triggerSource,
        step.triggerSource === "human" ? "きっかけ: 人間の指摘" : "きっかけ: AI自身の判断"
      );
      stepEl.appendChild(tag);
    }
    if (step.trigger) {
      stepEl.appendChild(el("p", "step-trigger", step.trigger));
    }

    if (step.prompt) {
      const block = el("div", "step-prompt-block");
      block.appendChild(el("p", "step-prompt-k", "Prompt"));
      block.appendChild(el("pre", "step-prompt", step.prompt));
      if (step.negative) {
        block.appendChild(el("p", "step-prompt-k neg", "Negative"));
        block.appendChild(el("pre", "step-prompt neg", step.negative));
      }
      stepEl.appendChild(block);
    }

    const body = el("div", "step-body");
    const img = el("img");
    img.src = step.image;
    img.alt = step.label;
    img.loading = "lazy";
    img.addEventListener("click", () => openLightbox(step.image, step.label));
    body.appendChild(img);
    body.appendChild(el("p", null, step.outcome));
    stepEl.appendChild(body);

    if (step.cause || step.change) {
      const analysis = el("div", "step-analysis");
      if (step.cause) {
        const row = el("div");
        row.appendChild(el("span", "k", "原因の仮説"));
        row.appendChild(document.createTextNode(step.cause));
        analysis.appendChild(row);
      }
      if (step.change) {
        const row = el("div");
        row.appendChild(el("span", "k", "次への変更"));
        row.appendChild(document.createTextNode(step.change));
        analysis.appendChild(row);
      }
      stepEl.appendChild(analysis);
    }

    timeline.appendChild(stepEl);
  });
  article.appendChild(timeline);

  if (caseData.insight) {
    const insight = el("div", "insight");
    insight.appendChild(el("strong", null, "Insight"));
    insight.appendChild(document.createTextNode(caseData.insight));
    article.appendChild(insight);
  }

  return article;
}

const casesEl = document.getElementById("cases");
if (CASES.length === 0) {
  casesEl.appendChild(el("div", "empty", "まだ記録がありません。次の制作から、悩んだ話やうまくいった話をここに残していきます。"));
} else {
  CASES.forEach((c) => casesEl.appendChild(buildCase(c)));
}
document.getElementById("case-count").textContent = String(CASES.length).padStart(2, "0");
</script>

</body>
</html>
